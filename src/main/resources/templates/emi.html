<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>EMI Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>EMI Details</h2>

    <table class="table table-bordered">

        <tr>
            <th>Loan ID</th>
            <td th:text="${emi.loanId}"></td>
        </tr>

        <tr>
            <th>Loan Amount</th>
            <td th:text="${emi.loanAmount}"></td>
        </tr>

        <tr>
            <th>Interest Rate</th>
            <td th:text="${emi.interestRate}"></td>
        </tr>

        <tr>
            <th>Tenure (Months)</th>
            <td th:text="${emi.tenureMonths}"></td>
        </tr>

        <tr>
            <th>Monthly EMI</th>
            <td th:text="${emi.emi}"></td>
        </tr>

    </table>

    <a href="/loans" class="btn btn-primary">
        Back to Loans
    </a>

</div>

</body>
</html>
