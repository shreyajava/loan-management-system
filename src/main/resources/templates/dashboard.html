<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Loan Management Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>
.card {
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card h3 {
    font-size: 40px;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="container mt-5">

    <h1 class="text-center mb-3">
        Loan Management Dashboard
    </h1>

    <p class="text-center text-muted mb-4">
        Real-time overview of customers and loan activities
    </p>

    <div class="text-center mb-4">

        <a href="/"
           class="btn btn-primary me-2">
            Home
        </a>

        <a href="/customers"
           class="btn btn-success me-2">
            Customers
        </a>

        <a href="/loans"
           class="btn btn-warning">
            Loans
        </a>

    </div>

    <div class="row">

        <!-- Total Customers -->
        <div class="col-md-4 mb-4">
            <div class="card bg-primary text-white text-center">
                <div class="card-body">
                    <h3 th:text="${dashboard.totalCustomers}"></h3>
                    <p>Total Customers</p>
                </div>
            </div>
        </div>

        <!-- Total Loans -->
        <div class="col-md-4 mb-4">
            <div class="card bg-info text-white text-center">
                <div class="card-body">
                    <h3 th:text="${dashboard.totalLoans}"></h3>
                    <p>Total Loans</p>
                </div>
            </div>
        </div>

        <!-- Approved Loans -->
        <div class="col-md-4 mb-4">
            <div class="card bg-success text-white text-center">
                <div class="card-body">
                    <h3 th:text="${dashboard.approvedLoans}"></h3>
                    <p>Approved Loans</p>
                </div>
            </div>
        </div>

        <!-- Rejected Loans -->
        <div class="col-md-4 mb-4">
            <div class="card bg-danger text-white text-center">
                <div class="card-body">
                    <h3 th:text="${dashboard.rejectedLoans}"></h3>
                    <p>Rejected Loans</p>
                </div>
            </div>
        </div>

        <!-- Pending Loans -->
        <div class="col-md-4 mb-4">
            <div class="card bg-warning text-dark text-center">
                <div class="card-body">
                    <h3 th:text="${dashboard.pendingLoans}"></h3>
                    <p>Pending Loans</p>
                </div>
            </div>
        </div>

        <!-- Closed Loans -->
        <div class="col-md-4 mb-4">
            <div class="card bg-secondary text-white text-center">
                <div class="card-body">
                    <h3 th:text="${dashboard.closedLoans}"></h3>
                    <p>Closed Loans</p>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
