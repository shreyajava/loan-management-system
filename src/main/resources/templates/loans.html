<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Loan List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
</head>

<body>

<div class="container mt-5">

```
<h2 class="mb-4">Loan Management</h2>

<div class="mb-3">

    <a href="/"
       class="btn btn-primary">
        Home
    </a>

    <a href="/loan-form"
       class="btn btn-success">
        Apply Loan
    </a>

    <a href="/dashboard-ui"
       class="btn btn-warning">
        Dashboard
    </a>

</div>

<table class="table table-bordered table-striped">

    <thead class="table-dark">
    <tr>
        <th>Loan ID</th>
        <th>Loan Type</th>
        <th>Amount</th>
        <th>Interest</th>
        <th>Tenure</th>
        <th>Status</th>
        <th>Customer ID</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="loan : ${loans}">

        <td th:text="${loan.loanId}"></td>

        <td th:text="${loan.loanType}"></td>

        <td th:text="${loan.loanAmount}"></td>

        <td th:text="${loan.interestRate}"></td>

        <td th:text="${loan.tenureMonths}"></td>

        <td th:text="${loan.status}"></td>

        <td th:text="${loan.customer.customerId}"></td>

        <td>

            <a th:href="@{/approve-loan/{id}(id=${loan.loanId})}"
               class="btn btn-success btn-sm">
                Approve
            </a>

            <a th:href="@{/reject-loan/{id}(id=${loan.loanId})}"
               class="btn btn-danger btn-sm">
                Reject
            </a>

            <a th:href="@{/close-loan/{id}(id=${loan.loanId})}"
               class="btn btn-secondary btn-sm">
                Close
            </a>

            <a th:href="@{/emi/{id}(id=${loan.loanId})}"
               class="btn btn-info btn-sm">
                EMI
            </a>

            <a th:href="@{/pay-emi/{id}(id=${loan.loanId})}"
               class="btn btn-dark btn-sm">
                Pay EMI
            </a>

        </td>

    </tr>

    </tbody>

</table>
```

</div>

</body>
</html>
