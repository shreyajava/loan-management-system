<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Customer Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Customer Form</h2>

    <form th:action="@{/save-customer}"
          th:object="${customer}"
          method="post">

        <input type="hidden"
               th:field="*{customerId}">

        <div class="mb-3">
            <label>Name</label>
            <input type="text"
                   th:field="*{customerName}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email"
                   th:field="*{email}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Phone</label>
            <input type="text"
                   th:field="*{phone}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Address</label>
            <input type="text"
                   th:field="*{address}"
                   class="form-control">
        </div>

        <button type="submit"
                class="btn btn-success">
            Save
        </button>

    </form>

</div>

</body>
</html>
