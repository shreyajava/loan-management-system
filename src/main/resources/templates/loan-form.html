<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Apply Loan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Apply Loan</h2>

    <form action="/save-loan" method="post">

        <div class="mb-3">
            <label class="form-label">Customer ID</label>
            <input type="number"
                   name="customerId"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Loan Type</label>
            <input type="text"
                   name="loanType"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Loan Amount</label>
            <input type="number"
                   name="loanAmount"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Interest Rate</label>
            <input type="number"
                   step="0.01"
                   name="interestRate"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Tenure (Months)</label>
            <input type="number"
                   name="tenureMonths"
                   class="form-control"
                   required>
        </div>

        <button type="submit"
                class="btn btn-success">
            Apply Loan
        </button>

        <a href="/loans"
           class="btn btn-secondary">
            Back
        </a>

    </form>

</div>

</body>
</html>
